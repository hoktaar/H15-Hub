<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>H15-Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg:        #0d0b08;
      --surface:   #161310;
      --surf2:     #1d1a15;
      --border:    #2e2519;
      --border2:   #4a3c28;
      --text:      #ede8dd;
      --muted:     #887a64;
      --dim:       #524638;
      --amber:     #f0a020;
      --green:     #5ecc80;
      --red:       #e84040;
      --yellow:    #f0c040;
      --accent:        var(--amber);
      --success:       var(--green);
      --danger:        var(--red);
      --warning:       var(--yellow);
      --surface-alt:   var(--surf2);
      --border-strong: var(--border2);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 13px;
    }

    header {
      border-bottom: 1px solid var(--border2);
      padding: 0 28px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo { display: flex; align-items: baseline; gap: 10px; }
    .logo-mark { font-family: 'Bebas Neue', sans-serif; font-size: 30px; letter-spacing: 0.06em; color: var(--amber); line-height: 1; }
    .logo-sub { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.2em; }

    #ws-status {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }

    #ws-status.connected { color: var(--green); }

    nav {
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      display: flex;
    }

    nav a {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      padding: 13px 16px;
      border-bottom: 2px solid transparent;
      transition: color 120ms, border-color 120ms;
    }

    nav a:hover { color: var(--text); }
    nav a.active { color: var(--amber); border-bottom-color: var(--amber); }

    main {
      max-width: 1380px;
      margin: 0 auto;
      padding: 24px 28px;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .page-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 0.06em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }

    @keyframes in-use-pulse {
      0%,100% { box-shadow: -3px 0 6px rgba(240,160,32,0); }
      50%      { box-shadow: -3px 0 18px rgba(240,160,32,0.4); }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--dim);
      border-radius: 2px;
      padding: 16px;
      cursor: pointer;
      transition: background-color 150ms ease, border-color 150ms ease;
    }

    .card:hover { background: var(--surf2); }

    .card.free    { border-left-color: var(--green); }
    .card.in_use  { border-left-color: var(--amber); animation: in-use-pulse 2.5s ease-in-out infinite; }
    .card.error   { border-left-color: var(--red); }

    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
    }

    /* keep .status-dot for JS compatibility but hide it */
    .status-dot { display: none; }

    .card-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 0.04em;
      line-height: 1.2;
      color: var(--text);
    }

    .card-type {
      margin-top: 2px;
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .card-status {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-top: 4px;
    }

    .card-status.free    { color: var(--green); }
    .card-status.in_use  { color: var(--amber); }
    .card-status.offline { color: var(--dim); }
    .card-status.error   { color: var(--red); }

    .card-user,
    .progress-text {
      margin-top: 6px;
      font-size: 11px;
      color: var(--muted);
    }

    .progress-bar {
      margin-top: 8px;
      height: 3px;
      background: var(--surf2);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--amber);
      transition: width 500ms ease;
    }

    .empty {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--muted);
      text-align: center;
      padding: 24px;
      font-size: 12px;
    }

    /* Toner bars */
    .toner-row {
      display: flex;
      gap: 5px;
      margin-top: 10px;
      align-items: flex-end;
    }
    .toner-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .toner-bar-wrap {
      width: 100%;
      height: 32px;
      background: var(--surf2);
      border-radius: 2px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }
    .toner-fill {
      width: 100%;
      border-radius: 2px;
      transition: height 500ms ease;
    }
    .toner-label {
      font-size: 9px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .toner-pct {
      font-size: 9px;
      color: var(--muted);
    }
    .toner-low .toner-label,
    .toner-low .toner-pct { color: var(--red); }

    .card-actions {
      display: flex;
      gap: 6px;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .btn-cta {
      flex: 1;
      padding: 8px 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      border-radius: 2px;
      border: 1px solid var(--amber);
      background: var(--amber);
      color: #0d0b08;
      cursor: pointer;
      transition: background 120ms, border-color 120ms;
      text-align: center;
      text-decoration: none;
      display: inline-block;
    }

    .btn-cta:hover { background: #d4911a; border-color: #d4911a; }

    .btn-cta-sec {
      padding: 8px 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      border-radius: 2px;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: color 120ms, border-color 120ms;
      text-decoration: none;
      display: inline-block;
    }

    .btn-cta-sec:hover { color: var(--text); border-color: var(--text); }

    .btn-plug {
      padding: 8px 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      border-radius: 2px;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--dim);
      cursor: pointer;
      transition: color 120ms, border-color 120ms, background 120ms;
    }

    .btn-plug:hover { color: var(--text); border-color: var(--text); }
    .btn-plug.plug-on { color: var(--green); border-color: #2a5030; background: rgba(94,204,128,0.06); }
    .btn-plug.plug-on:hover { background: rgba(94,204,128,0.14); }

    @media (max-width: 760px) {
      main { padding: 16px; }
      .page-header { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <span class="logo-mark">H15-HUB</span>
      <span class="logo-sub">Hebewerk e.V. Eberswalde</span>
    </div>
    <span id="ws-status">VERBINDE…</span>
  </header>
  <nav>
    <a href="/" class="active">Dashboard</a>
    <a href="/bookings">Buchungen</a>
    <a href="/boards">Boards</a>
    {% if current_user and current_user.role.value == 'admin' %}
    <a href="/admin">Admin</a>
    {% endif %}
  </nav>
  <main>
    <div class="page-header">
      <span class="page-title">Geräte</span>
    </div>
    <div class="grid" id="device-grid">
      <div class="empty">Lade Geräte…</div>
    </div>
  </main>

  <script>
    const statusLabel = { free: 'Frei', in_use: 'In Benutzung', offline: 'Offline', error: 'Fehler' };
    const typeLabel = { '3d_printer': '3D-Drucker', lasercutter: 'Lasercutter', printer: 'Drucker', sensor: 'Sensor' };

    function renderToner(toner) {
      if (!toner || !toner.length) return '';
      const items = toner.map(t => {
        const pct    = Math.max(0, Math.min(100, t.level));
        const isLow  = pct <= (t.low || 15);
        const fillH  = Math.round(pct * 32 / 100);
        // For black toner, use a visible dark grey instead of #000
        const fillColor = t.color === '#000000' ? '#555' : t.color;
        return `<div class="toner-item${isLow ? ' toner-low' : ''}">
          <div class="toner-bar-wrap">
            <div class="toner-fill" style="height:${fillH}px;background:${fillColor}"></div>
          </div>
          <div class="toner-label">${t.name}</div>
          <div class="toner-pct">${pct}%</div>
        </div>`;
      }).join('');
      return `<div class="toner-row">${items}</div>`;
    }

    function renderDevices(devices) {
      const grid = document.getElementById('device-grid');
      if (!devices.length) { grid.innerHTML = '<div class="empty">Keine Geräte gefunden.</div>'; return; }
      grid.innerHTML = devices.map(d => `
        <div class="card ${d.status}" onclick="location.href='/device/${d.id}'">
          <div class="card-header">
            <div class="status-dot ${d.status}"></div>
            <div>
              <div class="card-title">${d.name}</div>
              <div class="card-type">${typeLabel[d.type] || d.type}${d.raw?.model ? ' · ' + d.raw.model : ''}</div>
            </div>
          </div>
          <div class="card-status ${d.status}">${statusLabel[d.status] || d.status}</div>
          ${d.current_user ? `<div class="card-user">${d.current_user}</div>` : ''}
          ${d.progress !== null && d.progress !== undefined ? `
            <div class="progress-bar"><div class="progress-fill" style="width:${d.progress}%"></div></div>
            <div class="progress-text">${d.progress}%${d.eta_minutes ? ` · noch ca. ${d.eta_minutes} Min.` : ''}</div>
          ` : ''}
          ${d.type === 'printer' && d.raw?.toner ? renderToner(d.raw.toner) : ''}
          <div class="card-actions" onclick="event.stopPropagation()">
            ${d.type === 'printer' && d.status === 'free'
              ? `<a class="btn-cta" href="/device/${d.id}">Label drucken</a>`
              : d.type !== 'sensor' && d.status === 'free'
                ? `<a class="btn-cta" href="/bookings">Buchen</a>
                   <a class="btn-cta-sec" href="/device/${d.id}">Details</a>`
              : `<a class="btn-cta-sec" href="/device/${d.id}">Details</a>`
            }
            ${d.type === '3d_printer' && d.raw?.plug_on !== undefined && d.raw?.plug_on !== null
              ? `<button class="btn-plug${d.raw.plug_on ? ' plug-on' : ''}"
                   title="${d.raw.plug_on ? 'Steckdose ausschalten' : 'Steckdose einschalten'}"
                   onclick="togglePlug('${d.id}', ${d.raw.plug_on})">
                   ${d.raw.plug_on ? '⏻ AN' : '⏻ AUS'}
                 </button>`
              : ''
            }
            ${d.type === '3d_printer' && d.raw?.bambuddy_url
              ? `<a class="btn-cta-sec" href="${d.raw.bambuddy_url}" target="_blank" rel="noopener">Bambuddy</a>`
              : ''
            }
          </div>
        </div>
      `).join('');
    }

    async function togglePlug(deviceId, currentlyOn) {
      const action = currentlyOn ? 'plug_off' : 'plug_on';
      try {
        const res = await fetch(`/api/devices/${deviceId}/action`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({action}),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          alert(err.detail || 'Fehler beim Schalten.');
        }
      } catch (e) {
        alert('Netzwerkfehler: ' + e.message);
      }
    }

    const wsIndicator = document.getElementById('ws-status');
    let devices = [];

    function connect() {
      const ws = new WebSocket(`ws://${location.host}/ws/status`);
      ws.onopen = () => { wsIndicator.textContent = '● LIVE'; wsIndicator.className = 'connected'; };
      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'full_update') {
          devices = msg.devices;
          renderDevices(devices);
        } else if (msg.type === 'status_change') {
          const d = devices.find(x => x.id === msg.device_id);
          if (d) Object.assign(d, msg.device);
          renderDevices(devices);
          if (msg.new_status === 'free' && Notification.permission === 'granted') {
            new Notification(`${msg.device.name} ist jetzt frei!`);
          }
        }
      };
      ws.onclose = () => {
        wsIndicator.textContent = '○ GETRENNT';
        wsIndicator.className = '';
        setTimeout(connect, 3000);
      };
    }

    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission();
    }

    connect();
  </script>
</body>
</html>
