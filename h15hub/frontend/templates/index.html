<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard – H15-Hub</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%23f0a020'>⚙</text></svg>">
  <link rel="stylesheet" href="/static/base.css?v=130e85b5">
  <style>
    main {
      max-width: 1380px;
      margin: 0 auto;
      padding: 24px 28px;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .page-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 0.06em;
      color: var(--muted);
      text-transform: uppercase;
    }

    @keyframes ws-dot-pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    #ws-status.connected::before {
      content: '● ';
      animation: ws-dot-pulse 2s ease-in-out infinite;
      display: inline;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }

    @keyframes card-in {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-anim {
      animation: card-in 320ms cubic-bezier(0.25, 1, 0.5, 1) both;
      animation-delay: var(--delay, 0ms);
    }

    @keyframes status-flash {
      0%   { box-shadow: 0 0 0 0 rgba(240,160,32,0.5); }
      50%  { box-shadow: 0 0 0 6px rgba(240,160,32,0); }
      100% { box-shadow: none; }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--dim);
      border-radius: 2px;
      padding: 16px;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: background-color 150ms ease, border-color 150ms ease, transform 150ms var(--ease-out-quart);
      position: relative;
    }

    .card:hover { background: var(--surf2); transform: translateY(-1px); }
    .card:active { transform: translateY(0); }
    .card.status-changed { animation: status-flash 600ms var(--ease-out-quart); }

    .card.free    { border-left-color: var(--green); }
    .card.in_use { border-left-color: var(--amber); }
    .card.in_use::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      box-shadow: -3px 0 18px rgba(240,160,32,0.4);
      animation: in-use-pulse 2.5s ease-in-out infinite;
      border-radius: 2px;
    }
    @keyframes in-use-pulse {
      0%,100% { opacity: 0; }
      50%      { opacity: 1; }
    }
    .card.error   { border-left-color: var(--red); }

    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
    }

    /* keep .status-dot for JS compatibility but hide it */
    .status-dot { display: none; }

    .card-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 0.04em;
      line-height: 1.2;
      color: var(--text);
    }

    .card-type {
      margin-top: 2px;
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .card-status {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-top: 4px;
    }

    .card-status.free    { color: var(--green); }
    .card-status.in_use  { color: var(--amber); }
    .card-status.offline { color: var(--dim); }
    .card-status.error   { color: var(--red); }

    .card-user,
    .progress-text {
      margin-top: 6px;
      font-size: 11px;
      color: var(--muted);
    }

    .progress-bar {
      margin-top: 8px;
      height: 3px;
      background: var(--surf2);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--amber);
      transform-origin: left center;
      transform: scaleX(var(--progress, 0));
      transition: transform 500ms ease;
      width: 100%;
    }

    .empty {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--muted);
      text-align: center;
      padding: 24px;
      font-size: 12px;
    }

    /* Toner bars */
    .toner-row {
      display: flex;
      gap: 5px;
      margin-top: 10px;
      align-items: flex-end;
    }
    .toner-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .toner-bar-wrap {
      width: 100%;
      height: 32px;
      background: var(--surf2);
      border-radius: 2px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }
    .toner-fill {
      width: 100%;
      border-radius: 2px;
      transition: height 500ms ease;
    }
    .toner-label {
      font-size: 9px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .toner-pct {
      font-size: 9px;
      color: var(--muted);
    }
    .toner-low .toner-label,
    .toner-low .toner-pct { color: var(--red); }

    .card-actions {
      display: flex;
      gap: 6px;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    @media (max-width: 760px) {
      main { padding: 16px; }
      .page-header { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <span class="logo-mark">H15-HUB</span>
      <span class="logo-sub">Hebewerk e.V. Eberswalde</span>
    </div>
    <span id="ws-status">VERBINDE…</span>
  </header>
  <nav>
    <a href="/" class="active">Dashboard</a>
    <a href="/bookings">Buchungen</a>
    <a href="/boards">Boards</a>
    {% if current_user and current_user.role.value == 'admin' %}
    <a href="/admin">Admin</a>
    {% endif %}
  </nav>
  <main>
    <div class="page-header">
      <span class="page-title">Geräte</span>
    </div>
    <div class="grid" id="device-grid">
      <div class="empty">Lade Geräte…</div>
    </div>
  </main>

  <div id="toast-container"></div>
  <script>
  function showToast(msg, type = 'info') {
    const c = document.getElementById('toast-container');
    if (!c) return;
    const t = document.createElement('div');
    t.className = 'toast' + (type === 'error' ? ' toast-error' : type === 'success' ? ' toast-success' : '');
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(() => { t.classList.add('toast-exit'); setTimeout(() => t.remove(), 150); }, 3800);
  }
  </script>
  <script>
    const statusLabel = { free: 'Frei', in_use: 'In Benutzung', offline: 'Offline', error: 'Fehler' };
    const typeLabel = { '3d_printer': '3D-Drucker', lasercutter: 'Lasercutter', printer: 'Drucker', sensor: 'Sensor' };

    function renderToner(toner) {
      if (!toner || !toner.length) return '';
      const items = toner.map(t => {
        const pct    = Math.max(0, Math.min(100, t.level));
        const isLow  = pct <= (t.low || 15);
        const fillH  = Math.round(pct * 32 / 100);
        // For black toner, use a visible dark grey instead of #000
        const fillColor = t.color === '#000000' ? '#555' : t.color;
        return `<div class="toner-item${isLow ? ' toner-low' : ''}">
          <div class="toner-bar-wrap">
            <div class="toner-fill" style="height:${fillH}px;background:${fillColor}"></div>
          </div>
          <div class="toner-label">${t.name}</div>
          <div class="toner-pct">${pct}%</div>
        </div>`;
      }).join('');
      return `<div class="toner-row">${items}</div>`;
    }

    function renderDevices(devices) {
      const grid = document.getElementById('device-grid');
      if (!devices.length) { grid.innerHTML = '<div class="empty">Keine Geräte gefunden.</div>'; return; }
      grid.innerHTML = devices.map((d, i) => `
        <a class="card ${d.status} card-anim" href="/device/${d.id}" style="--delay:${i * 45}ms">
          <div class="card-header">
            <div class="status-dot ${d.status}"></div>
            <div>
              <div class="card-title">${d.name}</div>
              <div class="card-type">${typeLabel[d.type] || d.type}${d.raw?.model ? ' · ' + d.raw.model : ''}</div>
            </div>
          </div>
          <div class="card-status ${d.status}">${statusLabel[d.status] || d.status}</div>
          ${d.current_user ? `<div class="card-user">${d.current_user}</div>` : ''}
          ${d.progress !== null && d.progress !== undefined ? `
            <div class="progress-bar"><div class="progress-fill" style="--progress:${d.progress / 100}"></div></div>
            <div class="progress-text">${d.progress}%${d.eta_minutes ? ` · noch ca. ${d.eta_minutes} Min.` : ''}</div>
          ` : ''}
          ${d.type === 'printer' && d.raw?.toner ? renderToner(d.raw.toner) : ''}
          <div class="card-actions" onclick="event.stopPropagation()">
            ${d.type === 'printer' && d.status === 'free'
              ? `<a class="btn-cta" href="/device/${d.id}">Label drucken</a>`
              : d.type !== 'sensor' && d.status === 'free'
                ? `<a class="btn-cta" href="/bookings">Buchen</a>
                   <a class="btn-cta-sec" href="/device/${d.id}">Details</a>`
              : `<a class="btn-cta-sec" href="/device/${d.id}">Details</a>`
            }
            ${d.type === '3d_printer' && d.raw?.plug_on !== undefined && d.raw?.plug_on !== null
              ? `<button class="btn-plug${d.raw.plug_on ? ' plug-on' : ''}"
                   title="${d.raw.plug_on ? 'Steckdose ausschalten' : 'Steckdose einschalten'}"
                   onclick="event.preventDefault(); event.stopPropagation(); togglePlug('${d.id}', ${d.raw.plug_on})">
                   ${d.raw.plug_on ? '⏻ AN' : '⏻ AUS'}
                 </button>`
              : ''
            }
            ${d.type === '3d_printer' && d.raw?.bambuddy_url
              ? `<a class="btn-cta-sec" href="${d.raw.bambuddy_url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Bambuddy</a>`
              : ''
            }
          </div>
        </a>
      `).join('');
    }

    async function togglePlug(deviceId, currentlyOn) {
      const action = currentlyOn ? 'plug_off' : 'plug_on';
      try {
        const res = await fetch(`/api/devices/${deviceId}/action`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({action}),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          showToast(err.detail || 'Fehler beim Schalten.', 'error');
        }
      } catch (e) {
        showToast('Netzwerkfehler: ' + e.message, 'error');
      }
    }

    const wsIndicator = document.getElementById('ws-status');
    let devices = [];

    function connect() {
      const ws = new WebSocket(`ws://${location.host}/ws/status`);
      ws.onopen = () => { wsIndicator.textContent = 'LIVE'; wsIndicator.className = 'connected'; };
      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'full_update') {
          devices = msg.devices;
          renderDevices(devices);
        } else if (msg.type === 'status_change') {
          const d = devices.find(x => x.id === msg.device_id);
          if (d) Object.assign(d, msg.device);
          renderDevices(devices);
          // Flash the changed card after re-render
          requestAnimationFrame(() => {
            const el = document.querySelector(`[href="/device/${msg.device_id}"]`);
            if (el) {
              el.classList.remove('status-changed');
              void el.offsetWidth; // force reflow to restart animation
              el.classList.add('status-changed');
            }
          });
          if (msg.new_status === 'free' && Notification.permission === 'granted') {
            new Notification(`${msg.device.name} ist jetzt frei!`);
          }
        }
      };
      ws.onclose = () => {
        wsIndicator.textContent = '○ GETRENNT';
        wsIndicator.className = '';
        setTimeout(connect, 3000);
      };
    }

    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission();
    }

    connect();
  </script>
</body>
</html>
