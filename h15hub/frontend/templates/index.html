<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>H15-Hub</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #19191d;
      --surface: #232329;
      --surface-alt: #1d1d22;
      --border: #36363f;
      --border-strong: #4a4a55;
      --text: #ececf1;
      --muted: #a2a2ad;
      --accent: #e94560;
      --danger: #ff9aa8;
      --success: #83d39a;
      --warning: #e4b35d;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "SF Pro Text", "Helvetica Neue", Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
    }

    header h1 { font-size: 16px; font-weight: 600; }

    nav {
      display: flex;
      gap: 20px;
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }

    nav a {
      font-size: 14px;
      color: var(--muted);
      text-decoration: none;
    }

    nav a:hover,
    nav a.active { color: var(--text); }

    main {
      max-width: 1380px;
      margin: 0 auto;
      padding: 24px;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
    }

    .page-header h2 {
      font-size: 16px;
      font-weight: 600;
    }

    #ws-status {
      font-size: 13px;
      color: var(--muted);
    }

    #ws-status.connected { color: var(--success); }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      cursor: pointer;
      transition: background-color 150ms ease, border-color 150ms ease;
    }

    .card:hover {
      background: #27272e;
      border-color: var(--border-strong);
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 12px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 5px;
    }

    .status-dot.free { background: var(--success); }
    .status-dot.in_use { background: var(--warning); }
    .status-dot.offline { background: #686873; }
    .status-dot.error { background: var(--danger); }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.4;
    }

    .card-type {
      margin-top: 2px;
      font-size: 13px;
      color: var(--muted);
    }

    .card-status {
      font-size: 13px;
      margin-top: 6px;
    }

    .card-status.free { color: var(--success); }
    .card-status.in_use { color: var(--warning); }
    .card-status.offline { color: #8d8d97; }
    .card-status.error { color: var(--danger); }

    .card-user,
    .progress-text {
      margin-top: 8px;
      font-size: 13px;
      color: var(--muted);
    }

    .progress-bar {
      margin-top: 10px;
      height: 6px;
      background: var(--surface-alt);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      transition: width 500ms ease;
    }

    .empty {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      text-align: center;
      padding: 24px;
      font-size: 14px;
    }

    @media (max-width: 760px) {
      main { padding: 16px; }
      .page-header { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <header><h1>H15-Hub</h1></header>
  <nav>
    <a href="/" class="active">Dashboard</a>
    <a href="/bookings">Buchungen</a>
    <a href="/boards">Boards</a>
    {% if current_user and current_user.role.value == 'admin' %}
    <a href="/admin">Admin</a>
    {% endif %}
  </nav>
  <main>
    <div class="page-header">
      <h2>Geräte</h2>
      <span id="ws-status">Verbinde…</span>
    </div>
    <div class="grid" id="device-grid">
      <div class="empty">Lade Geräte…</div>
    </div>
  </main>

  <script>
    const statusLabel = { free: 'Frei', in_use: 'In Benutzung', offline: 'Offline', error: 'Fehler' };
    const typeLabel = { '3d_printer': '3D-Drucker', lasercutter: 'Lasercutter', printer: 'Drucker', sensor: 'Sensor' };

    function renderDevices(devices) {
      const grid = document.getElementById('device-grid');
      if (!devices.length) { grid.innerHTML = '<div class="empty">Keine Geräte gefunden.</div>'; return; }
      grid.innerHTML = devices.map(d => `
        <div class="card" onclick="location.href='/device/${d.id}'">
          <div class="card-header">
            <div class="status-dot ${d.status}"></div>
            <div>
              <div class="card-title">${d.name}</div>
              <div class="card-type">${typeLabel[d.type] || d.type}</div>
            </div>
          </div>
          <div class="card-status ${d.status}">${statusLabel[d.status] || d.status}</div>
          ${d.current_user ? `<div class="card-user">${d.current_user}</div>` : ''}
          ${d.progress !== null && d.progress !== undefined ? `
            <div class="progress-bar"><div class="progress-fill" style="width:${d.progress}%"></div></div>
            <div class="progress-text">${d.progress}%${d.eta_minutes ? ` · noch ca. ${d.eta_minutes} Min.` : ''}</div>
          ` : ''}
        </div>
      `).join('');
    }

    const wsIndicator = document.getElementById('ws-status');
    let devices = [];

    function connect() {
      const ws = new WebSocket(`ws://${location.host}/ws/status`);
      ws.onopen = () => { wsIndicator.textContent = '● Live'; wsIndicator.className = 'connected'; };
      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'full_update') {
          devices = msg.devices;
          renderDevices(devices);
        } else if (msg.type === 'status_change') {
          const d = devices.find(x => x.id === msg.device_id);
          if (d) Object.assign(d, msg.device);
          renderDevices(devices);
          if (msg.new_status === 'free' && Notification.permission === 'granted') {
            new Notification(`${msg.device.name} ist jetzt frei!`);
          }
        }
      };
      ws.onclose = () => {
        wsIndicator.textContent = '○ Getrennt';
        wsIndicator.className = '';
        setTimeout(connect, 3000);
      };
    }

    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission();
    }

    connect();
  </script>
</body>
</html>
