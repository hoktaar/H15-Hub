<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>H15-Hub</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #e8e8e8; min-height: 100vh; }

    header {
      background: #16213e;
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      border-bottom: 1px solid #1e3460;
    }
    header h1 { font-size: 1rem; font-weight: 600; color: #e8e8e8; }
    header .site-name { font-size: 0.875rem; color: #7a7a9a; }

    #ws-status {
      margin-left: auto;
      font-size: 0.8rem;
      color: #7a7a9a;
    }
    #ws-status.connected { color: #4caf50; }

    nav { display: flex; gap: 1.5rem; padding: 0.75rem 1.5rem; border-bottom: 1px solid #1e3460; }
    nav a { font-size: 0.875rem; color: #7a7a9a; text-decoration: none; }
    nav a:hover { color: #e8e8e8; }
    nav a.active { color: #e8e8e8; }

    main { padding: 1.5rem; }

    .section-label { font-size: 0.875rem; font-weight: 500; color: #7a7a9a; margin-bottom: 1rem; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1px; background: #1e3460; border: 1px solid #1e3460; }
    .card {
      background: #16213e;
      padding: 1.25rem;
      cursor: pointer;
      transition: background 150ms ease;
    }
    .card:hover { background: #1c2850; }

    .card-header { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.75rem; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .status-dot.free    { background: #4caf50; }
    .status-dot.in_use  { background: #ff9800; }
    .status-dot.offline { background: #4a4a5a; }
    .status-dot.error   { background: #f44336; }

    .card-title { font-size: 0.9rem; font-weight: 500; }
    .card-type  { font-size: 0.75rem; color: #7a7a9a; margin-top: 0.2rem; }

    .card-status { font-size: 0.8rem; margin-top: 0.5rem; }
    .card-status.free    { color: #4caf50; }
    .card-status.in_use  { color: #ff9800; }
    .card-status.offline { color: #4a4a5a; }
    .card-status.error   { color: #f44336; }

    .card-user { margin-top: 0.4rem; font-size: 0.75rem; color: #7a7a9a; }

    .progress-bar { margin-top: 0.75rem; background: #0f1f40; height: 4px; }
    .progress-fill { height: 100%; background: #e94560; transition: width 500ms ease; }
    .progress-text { font-size: 0.75rem; color: #7a7a9a; margin-top: 0.3rem; }

    .empty { color: #4a4a5a; text-align: center; padding: 3rem; }
  </style>
</head>
<body>
  <header>
    <h1>H15-Hub</h1>
    <span class="site-name">Hebewerk e.V.</span>
    <span id="ws-status">Verbinde…</span>
  </header>
  <nav>
    <a href="/" class="active">Dashboard</a>
    <a href="/bookings">Buchungen</a>
  </nav>
  <main>
    <div class="section-label">Geräte-Status</div>
    <div class="grid" id="device-grid">
      <div class="empty">Lade Geräte…</div>
    </div>
  </main>

  <script>
    const statusLabel = { free: 'Frei', in_use: 'In Benutzung', offline: 'Offline', error: 'Fehler' };
    const typeLabel = { '3d_printer': '3D-Drucker', lasercutter: 'Lasercutter', printer: 'Drucker', sensor: 'Sensor' };

    function renderDevices(devices) {
      const grid = document.getElementById('device-grid');
      if (!devices.length) { grid.innerHTML = '<div class="empty">Keine Geräte gefunden.</div>'; return; }
      grid.innerHTML = devices.map(d => `
        <div class="card" onclick="location.href='/device/${d.id}'">
          <div class="card-header">
            <div class="status-dot ${d.status}"></div>
            <div>
              <div class="card-title">${d.name}</div>
              <div class="card-type">${typeLabel[d.type] || d.type}</div>
            </div>
          </div>
          <div class="card-status ${d.status}">${statusLabel[d.status] || d.status}</div>
          ${d.current_user ? `<div class="card-user">${d.current_user}</div>` : ''}
          ${d.progress !== null && d.progress !== undefined ? `
            <div class="progress-bar"><div class="progress-fill" style="width:${d.progress}%"></div></div>
            <div class="progress-text">${d.progress}%${d.eta_minutes ? ` · noch ca. ${d.eta_minutes} Min.` : ''}</div>
          ` : ''}
        </div>
      `).join('');
    }

    const wsIndicator = document.getElementById('ws-status');
    let devices = [];

    function connect() {
      const ws = new WebSocket(`ws://${location.host}/ws/status`);
      ws.onopen = () => { wsIndicator.textContent = '● Live'; wsIndicator.className = 'connected'; };
      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'full_update') {
          devices = msg.devices;
          renderDevices(devices);
        } else if (msg.type === 'status_change') {
          const d = devices.find(x => x.id === msg.device_id);
          if (d) Object.assign(d, msg.device);
          renderDevices(devices);
          if (msg.new_status === 'free' && Notification.permission === 'granted') {
            new Notification(`${msg.device.name} ist jetzt frei!`);
          }
        }
      };
      ws.onclose = () => {
        wsIndicator.textContent = '○ Getrennt';
        wsIndicator.className = '';
        setTimeout(connect, 3000);
      };
    }

    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission();
    }

    connect();
  </script>
</body>
</html>
