<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anmeldung – H15-Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg:        #0d0b08;
      --surface:   #161310;
      --surf2:     #1d1a15;
      --border:    #2e2519;
      --border2:   #4a3c28;
      --text:      #ede8dd;
      --muted:     #887a64;
      --dim:       #524638;
      --amber:     #f0a020;
      --green:     #5ecc80;
      --red:       #e84040;
      --yellow:    #f0c040;
      --accent:        var(--amber);
      --success:       var(--green);
      --danger:        var(--red);
      --warning:       var(--yellow);
      --surface-alt:   var(--surf2);
      --border-strong: var(--border2);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 13px;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .login-wrap {
      width: min(100%, 400px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .brand {
      text-align: center;
    }

    .brand-mark {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 52px;
      letter-spacing: 0.08em;
      color: var(--amber);
      line-height: 1;
    }

    .brand-sub {
      font-size: 9px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.2em;
      margin-top: 4px;
    }

    .panel {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 2px;
      padding: 32px;
    }

    .panel-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .panel-sub {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 22px;
    }

    label {
      display: block;
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 5px;
      margin-top: 14px;
    }

    label:first-of-type { margin-top: 0; }

    input {
      width: 100%;
      background: var(--surf2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 9px 11px;
      border-radius: 2px;
      font-size: 13px;
      font-family: 'JetBrains Mono', monospace;
    }

    input:focus {
      outline: none;
      border-color: var(--amber);
    }

    button[type=submit] {
      width: 100%;
      margin-top: 22px;
      background: var(--amber);
      color: #0d0b08;
      border: 1px solid var(--amber);
      border-radius: 2px;
      padding: 10px 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 120ms, border-color 120ms;
    }

    button[type=submit]:hover { background: #d4911a; border-color: #d4911a; }

    .message { min-height: 20px; margin-top: 14px; font-size: 12px; }
    .message.error { color: var(--red); }

    .footer {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
    }

    .footer a { color: var(--text); }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="brand">
      <div class="brand-mark">H15-HUB</div>
      <div class="brand-sub">Hebewerk e.V. Eberswalde</div>
    </div>

    <div class="panel">
      <div class="panel-title">Anmeldung</div>
      <div class="panel-sub">Melde dich mit deinem H15-Hub Konto an.</div>
      <form id="login-form">
        <input type="hidden" id="next-path" value="{{ next_path }}">
        <label for="username">Benutzername</label>
        <input id="username" autocomplete="username" required>
        <label for="password">Passwort</label>
        <input id="password" type="password" autocomplete="current-password" required>
        <button type="submit">Anmelden</button>
        <div id="message" class="message"></div>
      </form>
    </div>

    <div class="footer">Noch kein Konto? Wenn noch kein Benutzer existiert, geht es über <a href="/setup">Setup</a>.</div>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const message = document.getElementById('message');
      message.className = 'message';
      message.textContent = '';

      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value,
          password: document.getElementById('password').value,
          next_path: document.getElementById('next-path').value || null,
        }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        message.className = 'message error';
        message.textContent = data.detail || 'Anmeldung fehlgeschlagen.';
        return;
      }
      location.href = data.redirect_to || '/';
    });
  </script>
</body>
</html>
