<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anmeldung – H15-Hub</title>
  <style>
    :root { color-scheme: dark; --bg:#19191d; --surface:#232329; --border:#36363f; --text:#ececf1; --muted:#a2a2ad; --accent:#e94560; --danger:#ff9aa8; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; display: grid; place-items: center; padding: 24px; background: var(--bg); color: var(--text); font-family: "SF Pro Text", "Helvetica Neue", Helvetica, sans-serif; }
    .panel { width: min(100%, 440px); background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; }
    h1 { font-size: 22px; margin-bottom: 8px; }
    p { color: var(--muted); font-size: 14px; margin-bottom: 18px; }
    label { display: block; margin: 14px 0 6px; font-size: 13px; color: var(--muted); }
    input { width: 100%; border: 1px solid var(--border); border-radius: 8px; background: #1d1d22; color: var(--text); padding: 11px 12px; }
    input:focus { outline: none; border-color: var(--accent); }
    button { width: 100%; margin-top: 18px; border: 1px solid var(--accent); border-radius: 8px; background: var(--accent); color: #fff; padding: 11px 14px; cursor: pointer; }
    .message { min-height: 20px; margin-top: 14px; font-size: 14px; }
    .message.error { color: var(--danger); }
    .footer { margin-top: 18px; font-size: 13px; color: var(--muted); }
    .footer a { color: var(--text); }
  </style>
</head>
<body>
  <main class="panel">
    <h1>Anmeldung</h1>
    <p>Melde dich mit deinem H15-Hub Konto an.</p>
    <form id="login-form">
      <input type="hidden" id="next-path" value="{{ next_path }}">
      <label for="username">Benutzername</label>
      <input id="username" autocomplete="username" required>
      <label for="password">Passwort</label>
      <input id="password" type="password" autocomplete="current-password" required>
      <button type="submit">Anmelden</button>
      <div id="message" class="message"></div>
    </form>
    <div class="footer">Noch kein Konto? Wenn noch kein Benutzer existiert, geht es über <a href="/setup">Setup</a>.</div>
  </main>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const message = document.getElementById('message');
      message.className = 'message';
      message.textContent = '';

      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value,
          password: document.getElementById('password').value,
          next_path: document.getElementById('next-path').value || null,
        }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        message.className = 'message error';
        message.textContent = data.detail || 'Anmeldung fehlgeschlagen.';
        return;
      }
      location.href = data.redirect_to || '/';
    });
  </script>
</body>
</html>
